name: Feature request
description: Propose an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What creator workflow does this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How should this be tested or demoed?
