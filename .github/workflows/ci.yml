name: CI

on:
  pull_request:
  push:
    branches:
      - develop
      - master

permissions:
  contents: read

jobs:
  repository-controls:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Verify immutable GitHub Action pins
        shell: bash
        run: |
          set -euo pipefail
          invalid_pins=()
          while IFS= read -r line; do
            reference="${line##*@}"
            reference="${reference%%[[:space:]]*}"
            if [[ ! "$reference" =~ ^[0-9a-fA-F]{40}$ ]]; then
              invalid_pins+=("$line")
            fi
          done < <(grep -R -n -E '^[[:space:]]*uses:' .github/workflows || true)

          if (( ${#invalid_pins[@]} > 0 )); then
            printf 'Every workflow action must use a full 40-character commit SHA:\n'
            printf ' - %s\n' "${invalid_pins[@]}"
            exit 1
          fi

      - name: Verify dependency update automation
        shell: bash
        run: |
          set -euo pipefail
          config=.github/dependabot.yml
          test -f "$config"
          grep -qE 'package-ecosystem:[[:space:]]*npm' "$config"
          grep -qE 'package-ecosystem:[[:space:]]*github-actions' "$config"
          weekly_schedules="$(grep -cE 'interval:[[:space:]]*weekly' "$config" || true)"
          test "$weekly_schedules" -ge 2

  quality:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.17.0"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

      - name: Coverage
        run: pnpm run test -- --coverage

      - name: Typecheck
        run: pnpm typecheck

      - name: Editor, theme, and documentation contracts
        run: |
          pnpm check:editor-budget
          pnpm check:theme-contract
          pnpm check:docs

      - name: Validate project fixtures
        run: |
          pnpm validate:sample
          pnpm validate:starter

      - name: Validate development provenance and release hygiene
        run: |
          pnpm validate:provenance
          pnpm check:release

      - name: Build
        run: pnpm build

      - name: Verify Windows package
        run: pnpm verify:windows-package

      - name: Packaged Electron smoke
        run: pnpm test:e2e:packaged

      - name: Upload packaged diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: packaged-e2e-diagnostics
          path: test-results/packaged/
          if-no-files-found: ignore

      - name: Upload Windows coverage diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-windows
          path: coverage/
          if-no-files-found: ignore

  e2e:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.17.0"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Chromium for Playwright
        run: pnpm exec playwright install chromium

      - name: End-to-end smoke
        run: pnpm test:e2e

      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: browser-e2e-diagnostics
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

  quality-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.17.0"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

      - name: Coverage
        run: pnpm run test -- --coverage

      - name: Typecheck
        run: pnpm typecheck

      - name: Documentation contract
        run: pnpm check:docs

      - name: Validate project fixtures
        run: |
          pnpm validate:sample
          pnpm validate:starter

      - name: Build web player
        run: pnpm --filter @pointclick/player-web build

      - name: Upload Ubuntu quality diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: quality-ubuntu-diagnostics
          path: |
            coverage/
            test-results/
          if-no-files-found: ignore

  dependency-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.17.0"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit:dependencies
