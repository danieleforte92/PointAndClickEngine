name: CI

on:
  pull_request:
  push:
    branches:
      - develop
      - master

jobs:
  quality:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.17.0"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

      - name: Coverage
        run: pnpm run test -- --coverage

      - name: Typecheck
        run: pnpm typecheck

      - name: Validate project fixtures
        run: |
          pnpm validate:sample
          pnpm validate:starter

      - name: Validate development provenance and release hygiene
        run: |
          pnpm validate:provenance
          pnpm check:release

      - name: Build
        run: pnpm build

      - name: Verify Windows package
        run: pnpm verify:windows-package

      - name: Packaged Electron smoke
        run: pnpm test:e2e:packaged

      - name: Upload packaged diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: packaged-e2e-diagnostics
          path: test-results/packaged/
          if-no-files-found: ignore

  e2e:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.17.0"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Chromium for Playwright
        run: pnpm exec playwright install chromium

      - name: End-to-end smoke
        run: pnpm test:e2e

      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: browser-e2e-diagnostics
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

  quality-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.17.0"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Validate project fixtures
        run: |
          pnpm validate:sample
          pnpm validate:starter

      - name: Build web player
        run: pnpm --filter @pointclick/player-web build

  dependency-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.17.0"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level high
