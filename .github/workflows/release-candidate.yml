name: Release candidate

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Commit, branch, or tag to build
        required: false
        default: develop

jobs:
  windows-candidate:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ inputs.ref }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.17.0"
          cache: pnpm

      - name: Install frozen dependency graph
        run: pnpm install --frozen-lockfile

      - name: Validate candidate
        run: |
          pnpm test
          pnpm typecheck
          pnpm validate:sample
          pnpm validate:starter
          pnpm audit --audit-level high
          pnpm validate:provenance
          pnpm check:release:candidate

      - name: Install Chromium for Playwright
        run: pnpm exec playwright install chromium

      - name: Browser end-to-end smoke
        run: pnpm test:e2e

      - name: Build Windows editor package
        run: pnpm --filter @pointclick/editor build

      - name: Smoke-check package contents
        run: pnpm verify:windows-package

      - name: Launch packaged Windows smoke test
        run: pnpm test:e2e:packaged

      - name: Upload packaged diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: packaged-e2e-diagnostics
          path: test-results/packaged/
          if-no-files-found: ignore

      - name: Archive Windows x64 package
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          New-Item -ItemType Directory -Force release-artifacts | Out-Null
          Compress-Archive `
            -Path apps/editor/out/PointClickStudio-win32-x64 `
            -DestinationPath "release-artifacts/PointClickStudio-v$version-win32-x64.zip" `
            -CompressionLevel Optimal

      - name: Generate candidate checksums
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          node scripts/create-checksums.mjs `
            apps/editor/out `
            release-artifacts/SHA256SUMS.txt `
            "release-artifacts/PointClickStudio-v$version-win32-x64.zip"

      - name: Evaluate strict provenance gate
        id: provenance
        continue-on-error: true
        run: node scripts/validate-provenance.mjs --strict --format=json > release-artifacts/provenance-release-gate.json

      - name: Record release evidence
        env:
          RELEASE_PACKAGED_PREVIEW: passed
          RELEASE_PACKAGED_PREVIEW_EVIDENCE: test-results/packaged/
          RELEASE_SIGNING_STATUS: unsigned-beta
        run: node scripts/release-record.mjs --output release-artifacts/release-evidence.json --checksums release-artifacts/SHA256SUMS.txt

      - name: Upload unsigned candidate artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-creator-alpha-candidate
          path: |
            release-artifacts/
          if-no-files-found: warn

      - name: Require cleared provenance before release approval
        if: steps.provenance.outcome != 'success'
        shell: pwsh
        run: |
          Write-Error "Candidate artifacts were uploaded, but the strict provenance gate remains blocked. This workflow does not publish a release."
          exit 1
